
<main class="h-full app-bg-main font-sans pt-safe pb-safe px-3 sm:px-6 md:px-8 flex flex-col transition-colors duration-300" style="min-height: 100vh; min-height: 100dvh;">
  <div class="max-w-screen-2xl mx-auto w-full flex-1 flex flex-col" style="min-height: 0;">
    
    <!-- Header -->
    <header class="flex justify-between items-center mb-2 sm:mb-8 shrink-0 relative px-1 sm:px-0 pt-2 sm:pt-4">
      <div class="w-8 sm:w-10 lg:w-0"></div> <!-- Spacer for centering -->
      
      <div class="text-center">
        <h1 class="text-xl sm:text-4xl lg:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-[var(--accent-secondary)] to-[var(--accent-primary)] truncate">
          Mermaid Generator
        </h1>
        <p class="hidden sm:block mt-2 text-lg app-text-muted">Instantly visualize your Mermaid diagrams.</p>
      </div>

      <button (click)="store.isSettingsModalOpen.set(true)" class="p-2 app-text-muted hover:text-[var(--text-main)] hover:bg-[var(--bg-secondary)] rounded-lg transition-all" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" sm:width="24" sm:height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </header>

    <!-- Mobile Segmented View Switcher (Simple Version) -->
    <div class="md:hidden flex bg-[var(--bg-secondary)] border border-[var(--border-color)] p-1 rounded-xl mx-auto w-full max-w-sm shrink-0 mb-4">
      <button 
        (click)="store.setMobileTab('editor')"
        class="flex-1 flex items-center justify-center gap-2 py-2 text-xs sm:text-sm font-semibold rounded-lg transition-all"
        [class.bg-[var(--accent-primary)]]="store.mobileTab() === 'editor'"
        [class.text-white]="store.mobileTab() === 'editor'"
        [class.app-text-muted]="store.mobileTab() !== 'editor'"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
        Editor
      </button>
      <button 
        (click)="store.setMobileTab('preview')"
        class="flex-1 flex items-center justify-center gap-2 py-2 text-xs sm:text-sm font-semibold rounded-lg transition-all"
        [class.bg-[var(--accent-primary)]]="store.mobileTab() === 'preview'"
        [class.text-white]="store.mobileTab() === 'preview'"
        [class.app-text-muted]="store.mobileTab() !== 'preview'"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        Preview
      </button>
    </div>

    <!-- Main Content Area -->
    <div class="flex-grow min-h-0 relative flex gap-6 lg:gap-8 transition-all duration-300" style="min-height: 0; overflow: hidden;">
      
      <!-- Left Workspace: Editor & Preview columns -->
      <div class="flex-1 min-h-0 relative md:grid md:gap-6 lg:gap-8 transition-all duration-300"
           [class.md:grid-cols-2]="!editorExpanded() && !previewExpanded()"
           [class.md:grid-cols-1]="editorExpanded() || previewExpanded()"
           style="min-height: 0; overflow: hidden;">
        
        <!-- Editor Column -->
        <div 
          class="flex flex-col md:h-full absolute inset-0 md:relative md:block transition-all duration-300"
          style="height: 100%;"
          [class.z-10]="store.mobileTab() === 'editor'"
          [class.opacity-100]="store.mobileTab() === 'editor' && !previewExpanded()"
          [class.opacity-0]="(store.mobileTab() !== 'editor' && !editorExpanded()) || previewExpanded()"
          [class.pointer-events-none]="(store.mobileTab() !== 'editor' || previewExpanded()) && !editorExpanded()"
          [class.md:opacity-100]="!previewExpanded()"
          [class.md:pointer-events-auto]="!previewExpanded()"
          [class.md:hidden]="previewExpanded()"
        >
          <app-code-editor 
            [code]="store.mermaidCode()" 
            [isExpanded]="editorExpanded()"
            (codeChange)="store.setCode($event)"
            (toggleExpand)="toggleEditorExpand()"
          >
            <div actions class="flex gap-1.5 sm:gap-2 items-center overflow-x-auto max-w-full no-scrollbar pb-1 sm:pb-0">
               <button (click)="store.openAiModal('refine')" [disabled]="!store.mermaidCode().trim()" class="text-xs bg-amber-600 hover:bg-amber-500 disabled:bg-amber-600/50 disabled:cursor-not-allowed text-white transition-colors px-2 sm:px-3 py-1.5 rounded-md flex items-center gap-1.5 border border-amber-500/50 shadow-sm shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                <span class="hidden sm:inline">Refine</span>
              </button>
              
              <button (click)="store.openAiModal('generate')" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white transition-colors px-2 sm:px-3 py-1.5 rounded-md flex items-center gap-1.5 border border-indigo-500/50 shadow-sm shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L12 3Z"/></svg>
                <span class="hidden sm:inline">AI Generate</span>
                <span class="sm:hidden">AI</span>
              </button>
              
              <button (click)="store.isExampleModalOpen.set(true)" class="text-xs app-btn transition-colors px-2 sm:px-3 py-1.5 rounded-md flex items-center gap-1.5 border app-border shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <span class="hidden sm:inline">Examples</span>
              </button>

              <div class="w-px bg-[var(--border-color)] mx-1 shrink-0 h-4"></div>

              <button (click)="store.addToHistory()" class="text-xs app-btn transition-colors px-2 sm:px-3 py-1.5 rounded-md flex items-center gap-1.5 border app-border shrink-0" title="Save to History">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                <span class="hidden sm:inline">Save</span>
              </button>

              <button (click)="store.isHistoryModalOpen.set(true)" class="text-xs app-btn transition-colors px-2 sm:px-3 py-1.5 rounded-md flex items-center gap-1.5 border app-border shrink-0" title="View History">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span class="hidden sm:inline">History</span>
              </button>
            </div>
          </app-code-editor>
        </div>

        <!-- Preview Column -->
        <div 
          class="flex flex-col md:h-full absolute inset-0 md:relative md:block transition-all duration-300"
          style="height: 100%;"
          [class.z-10]="store.mobileTab() === 'preview'"
          [class.opacity-100]="store.mobileTab() === 'preview' && !editorExpanded()"
          [class.opacity-0]="(store.mobileTab() !== 'preview' && !previewExpanded()) || editorExpanded()"
          [class.pointer-events-none]="(store.mobileTab() !== 'preview' || editorExpanded()) && !previewExpanded()"
          [class.md:opacity-100]="!editorExpanded()"
          [class.md:pointer-events-auto]="!editorExpanded()"
          [class.md:hidden]="editorExpanded()"
        >
          <app-chart-preview 
            #preview
            [code]="store.mermaidCode()"
            [theme]="store.theme()"
            [isExpanded]="previewExpanded()"
            (onRenderStart)="store.isRendering.set(true)"
            (onRenderEnd)="store.isRendering.set(false)"
            (onRenderError)="store.renderError.set($event)"
            (toggleExpand)="togglePreviewExpand()"
          >
            <app-toolbar 
              controls 
              [themes]="store.themes" 
              [selectedTheme]="store.theme()" 
              [isRendering]="store.isRendering()"
              [disabledExport]="!!store.renderError() || !store.mermaidCode().trim()"
              (themeChange)="store.setTheme($event)"
              (openExport)="store.isExportModalOpen.set(true)"
            ></app-toolbar>
          </app-chart-preview>
        </div>
      </div>

      <!-- AI Copilot sidebar panel -->
      <app-ai-copilot
        [class.hidden]="!store.isAiModalOpen()"
        class="shrink-0"
      ></app-ai-copilot>
    </div>

    <footer class="text-center mt-4 text-slate-500 text-xs sm:text-sm shrink-0 hidden lg:block">
      <p>Powered by Angular & Mermaid.js</p>
    </footer>
  </div>

  <app-example-modal
    [isOpen]="store.isExampleModalOpen()"
    [examples]="chartExamples"
    (close)="store.isExampleModalOpen.set(false)"
    (select)="handleExampleLoad($event)"
  ></app-example-modal>

  <app-export-modal
    [isOpen]="store.isExportModalOpen()"
    (close)="store.isExportModalOpen.set(false)"
    (confirm)="handleExport($event)"
  ></app-export-modal>

  <app-settings-modal
    [isOpen]="store.isSettingsModalOpen()"
    (close)="store.isSettingsModalOpen.set(false)"
  ></app-settings-modal>

  <app-history-modal
    [isOpen]="store.isHistoryModalOpen()"
    [history]="store.history()"
    (close)="store.isHistoryModalOpen.set(false)"
    (load)="handleHistoryLoad($event)"
    (delete)="store.deleteFromHistory($event)"
  ></app-history-modal>
</main>
